services:
  postgres:
    image: postgres:16-alpine
    container_name: cyberstore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cyberstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cyberstore_password}
      POSTGRES_DB: ${POSTGRES_DB:-cyberstore_db}
    ports:
      - "5432:5432"
    volumes:
      - cyberstore_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cyberstore} -d ${POSTGRES_DB:-cyberstore_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: cyberstore-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cyberstore_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: cyberstore-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      FRONTEND_ORIGIN: http://localhost
      API_PREFIX: /api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - cyberstore_backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cyberstore-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - cyberstore_frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: cyberstore-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  cyberstore_postgres_data:
  cyberstore_redis_data:
  cyberstore_backend_node_modules:
  cyberstore_frontend_node_modules:
